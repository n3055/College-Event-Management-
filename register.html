<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    video.bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      opacity: 0.8;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100vw;
      background: rgba(0, 0, 0, 0.5);
      z-index: -1;
    }

    form {
      background: rgba(34, 34, 34, 0.7);
      padding: 40px 60px;
      border-radius: 12px;
      width: 700px;
      box-shadow: 0 0 15px orange;
      z-index: 1;
    }

    h2 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 30px;
      color: white;
    }

    input, select {
      width: 100%;
      padding: 16px;
      margin-top: 15px;
      border-radius: 6px;
      border: none;
      font-size: 18px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      background: orange;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: darkorange;
    }

    .back-button {
      display: block;
      text-align: center;
      background: orange;
      color: white;
      text-decoration: none;
      padding: 14px;
      margin-top: 15px;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
    }

    .back-button:hover {
      background: darkorange;
    }
  </style>
</head>
<body>
  <video autoplay muted loop class="bg-video" playsinline>
    <source src="assets/video_3.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div class="overlay"></div>
  <form action="register.php" method="POST">
    <h2>Register</h2>
    <input type="text" name="name" placeholder="Full Name" required />
    <input type="email" name="email" placeholder="Email" required />
    <input type="password" name="password" placeholder="Password" required />
    <select name="role" required>
      <option value="">Select Role</option>
      <option value="student">Student</option>
      <option value="faculty">Faculty</option>
      <option value="club_admin">Club Admin</option>
    </select>
    <button type="submit">Register</button>
    <a href="index.html" class="back-button">← Back to Home</a>
  </form>

</body>
</html>
